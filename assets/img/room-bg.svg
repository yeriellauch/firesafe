<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e2d8"/>
      <stop offset="100%" stop-color="#d4cdbf"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a7e5e"/>
      <stop offset="100%" stop-color="#6e5a42"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f3a2e"/>
      <stop offset="100%" stop-color="#162a21"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbe8"/>
      <stop offset="100%" stop-color="#88b5cc"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c19a6b"/>
      <stop offset="100%" stop-color="#8f6f4a"/>
    </linearGradient>
  </defs>

  <!-- Wall -->
  <rect x="0" y="0" width="800" height="1050" fill="url(#wall)"/>
  <!-- Floor (perspective) -->
  <polygon points="0,1050 800,1050 800,1400 0,1400" fill="url(#floor)"/>
  <!-- Floor planks -->
  <g stroke="#5a4632" stroke-width="1.5" opacity="0.55">
    <line x1="0" y1="1110" x2="800" y2="1110"/>
    <line x1="0" y1="1175" x2="800" y2="1175"/>
    <line x1="0" y1="1245" x2="800" y2="1245"/>
    <line x1="0" y1="1320" x2="800" y2="1320"/>
  </g>
  <!-- Wall/floor shadow line -->
  <rect x="0" y="1050" width="800" height="6" fill="#3d3022" opacity="0.4"/>

  <!-- Window left -->
  <rect x="60" y="180" width="220" height="320" fill="#f5f0e6" stroke="#8a7a5e" stroke-width="6"/>
  <rect x="72" y="192" width="196" height="296" fill="url(#window)"/>
  <line x1="170" y1="192" x2="170" y2="488" stroke="#f5f0e6" stroke-width="6"/>
  <line x1="72" y1="340" x2="268" y2="340" stroke="#f5f0e6" stroke-width="6"/>
  <!-- Window sill -->
  <rect x="50" y="500" width="240" height="14" fill="#a89272"/>

  <!-- Blackboard -->
  <rect x="350" y="220" width="400" height="240" rx="6" fill="url(#board)" stroke="#7a5a3a" stroke-width="10"/>
  <g stroke="#e8e2d8" stroke-width="2" opacity="0.55" fill="none">
    <path d="M380 290 q30 -20 60 0 t60 0"/>
    <path d="M380 340 h180"/>
    <path d="M380 380 h140"/>
  </g>

  <!-- Door -->
  <rect x="610" y="540" width="150" height="500" fill="#6f4e30"/>
  <rect x="622" y="552" width="126" height="476" fill="#8a6440"/>
  <rect x="634" y="564" width="102" height="200" fill="#6f4e30"/>
  <rect x="634" y="780" width="102" height="240" fill="#6f4e30"/>
  <circle cx="724" cy="800" r="6" fill="#d4af37"/>

  <!-- Wall outlet -->
  <rect x="340" y="940" width="32" height="44" rx="3" fill="#ece6dc" stroke="#a89272" stroke-width="2"/>
  <circle cx="350" cy="958" r="2.5" fill="#3a2f22"/>
  <circle cx="362" cy="958" r="2.5" fill="#3a2f22"/>
  <rect x="352" y="970" width="8" height="3" rx="1" fill="#3a2f22"/>

  <!-- Desk in foreground -->
  <rect x="80" y="780" width="240" height="20" fill="url(#desk)"/>
  <rect x="100" y="800" width="14" height="240" fill="#8f6f4a"/>
  <rect x="286" y="800" width="14" height="240" fill="#8f6f4a"/>
  <!-- Books on desk -->
  <rect x="130" y="740" width="24" height="40" fill="#a83232"/>
  <rect x="156" y="744" width="22" height="36" fill="#2e5a8a"/>
  <rect x="180" y="748" width="20" height="32" fill="#3a8a4a"/>
  <!-- Pen -->
  <rect x="220" y="772" width="60" height="5" rx="2" fill="#222"/>

  <!-- Subtle grain -->
  <rect x="0" y="0" width="800" height="1400" fill="#000" opacity="0.02"/>
</svg>
