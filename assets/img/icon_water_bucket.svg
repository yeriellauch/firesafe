<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="bucket" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a0e0e"/>
      <stop offset="50%" stop-color="#c8312c"/>
      <stop offset="100%" stop-color="#5a0808"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ec9dc"/>
      <stop offset="100%" stop-color="#5a8aa8"/>
    </linearGradient>
  </defs>
  <!-- Handle -->
  <path d="M40 50 q60 -50 120 0" fill="none" stroke="#1f1f1f" stroke-width="5" stroke-linecap="round"/>
  <circle cx="40" cy="50" r="5" fill="#1f1f1f"/>
  <circle cx="160" cy="50" r="5" fill="#1f1f1f"/>
  <!-- Bucket body (cone shape) -->
  <path d="M30 60 L170 60 L150 240 L50 240 Z" fill="url(#bucket)"/>
  <!-- Water surface -->
  <ellipse cx="100" cy="62" rx="70" ry="10" fill="url(#water)"/>
  <ellipse cx="100" cy="60" rx="70" ry="10" fill="none" stroke="#1f1f1f" stroke-width="2" opacity="0.4"/>
  <!-- Label -->
  <rect x="56" y="120" width="88" height="50" fill="#f5f0e6"/>
  <text x="100" y="142" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#7a0e0e" text-anchor="middle">FIRE</text>
  <text x="100" y="158" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#3a3a3a" text-anchor="middle">BUCKET</text>
  <!-- Highlight -->
  <path d="M40 70 L52 230 L60 230 L48 70 Z" fill="#fff" opacity="0.18"/>
  <!-- Rim -->
  <path d="M30 60 L170 60" stroke="#1f1f1f" stroke-width="3"/>
  <!-- Base ellipse -->
  <ellipse cx="100" cy="240" rx="50" ry="6" fill="#3a0606"/>
</svg>
