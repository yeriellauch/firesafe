<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320">
  <defs>
    <linearGradient id="bodyC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a31818"/>
      <stop offset="50%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#7a0e0e"/>
    </linearGradient>
  </defs>
  <!-- Handle -->
  <rect x="68" y="20" width="64" height="14" rx="3" fill="#2b2b2b"/>
  <rect x="76" y="34" width="48" height="10" fill="#3a3a3a"/>
  <!-- Neck -->
  <rect x="84" y="44" width="32" height="22" fill="#1f1f1f"/>
  <!-- Pressure gauge -->
  <circle cx="62" cy="58" r="14" fill="#e8e8e8" stroke="#1f1f1f" stroke-width="3"/>
  <line x1="62" y1="58" x2="70" y2="50" stroke="#a31818" stroke-width="2"/>
  <!-- Hose -->
  <path d="M116 60 q30 10 30 60 q0 40 -10 60" fill="none" stroke="#1f1f1f" stroke-width="6" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="50" y="66" width="100" height="200" rx="14" fill="url(#bodyC)"/>
  <!-- Label band -->
  <rect x="50" y="140" width="100" height="56" fill="#f5f0e6"/>
  <text x="100" y="172" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#a31818" text-anchor="middle">FIRE</text>
  <text x="100" y="188" font-family="Inter, Arial, sans-serif" font-size="9" fill="#444" text-anchor="middle">EXTINGUISHER</text>
  <!-- Highlight -->
  <rect x="58" y="74" width="14" height="180" rx="6" fill="#fff" opacity="0.18"/>
  <!-- Base ring -->
  <rect x="46" y="262" width="108" height="14" rx="4" fill="#1f1f1f"/>
  <rect x="56" y="276" width="88" height="20" rx="2" fill="#2b2b2b"/>
</svg>
